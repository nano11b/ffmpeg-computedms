<!DOCTYPE html>
<html>
<head>
    <title>Media Cluster Dashboard</title>
</head>
<body>
<h1>Media Conversion Dashboard</h1>

<form action="/submit" method="post" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <input type="text" name="output_format" placeholder="mp4" required>
    <button type="submit">Convert</button>
</form>

<h2>Jobs</h2>
<ul>
{% for job_id, job in jobs.items() %}
    <li>
        {{ job_id }} - {{ job.status }}
        {% if job.output %}
            <a href="/download/{{ job_id }}">Download</a>
        {% endif %}
    </li>
{% endfor %}
</ul>

</body>
</html>
